<svg xmlns="http://www.w3.org/2000/svg" width="820" height="312" viewBox="0 0 820 312">
  <!-- Background -->
  <rect width="820" height="312" fill="#1a1f2e"/>

  <!-- Subtle glows -->
  <circle cx="710" cy="156" r="210" fill="rgba(29,171,217,0.05)"/>
  <circle cx="60"  cy="80"  r="120" fill="rgba(29,171,217,0.04)"/>

  <!-- ── LEFT: mini icon (head + circuit, scaled to ~0.22) ── -->
  <g transform="translate(42,48) scale(0.215)">
    <!-- Head -->
    <path fill="#1dabd9" d="M260,88 C310,80 398,132 400,210 C402,280 374,325 345,348 L340,375 L340,408 L305,408 L305,375 C284,362 264,340 251,314 C234,282 230,252 233,226 C237,202 243,178 249,158 C253,138 258,112 260,88 Z"/>
    <path fill="#1dabd9" d="M233,226 C210,228 196,246 193,265 C190,283 200,298 217,304 C228,308 240,302 242,293"/>
    <!-- Nodes -->
    <circle cx="100" cy="100" r="10" fill="none" stroke="#1dabd9" stroke-width="3.5"/>
    <circle cx="100" cy="100" r="4"  fill="#1dabd9"/>
    <circle cx="142" cy="148" r="24" fill="none" stroke="#1dabd9" stroke-width="5"/>
    <circle cx="142" cy="148" r="9"  fill="#1dabd9"/>
    <circle cx="97"  cy="228" r="18" fill="none" stroke="#1dabd9" stroke-width="4"/>
    <circle cx="97"  cy="228" r="7"  fill="#1dabd9"/>
    <circle cx="144" cy="290" r="18" fill="none" stroke="#1dabd9" stroke-width="4"/>
    <circle cx="144" cy="290" r="7"  fill="#1dabd9"/>
    <circle cx="192" cy="345" r="14" fill="none" stroke="#1dabd9" stroke-width="3.5"/>
    <circle cx="192" cy="345" r="5"  fill="#1dabd9"/>
    <!-- Connections -->
    <line x1="108" y1="108" x2="130" y2="132" stroke="#1dabd9" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="142" y1="172" x2="112" y2="211" stroke="#1dabd9" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="103" y1="245" x2="130" y2="273" stroke="#1dabd9" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="152" y1="307" x2="182" y2="332" stroke="#1dabd9" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="163" y1="158" x2="233" y2="218" stroke="#1dabd9" stroke-width="3"   stroke-linecap="round"/>
  </g>

  <!-- ── BRAND NAME ── -->
  <!-- "AutoMark" in white -->
  <text x="134" y="148"
        font-family="'Segoe UI', 'Arial', sans-serif"
        font-size="58" font-weight="700"
        fill="#e2e8f0" letter-spacing="-1">AutoMark</text>
  <!-- "IQ" in blue -->
  <text x="487" y="148"
        font-family="'Segoe UI', 'Arial', sans-serif"
        font-size="58" font-weight="700"
        fill="#1dabd9" letter-spacing="-1">IQ</text>

  <!-- Blue accent underline -->
  <rect x="42" y="162" width="360" height="3" rx="2" fill="#1dabd9"/>

  <!-- Tagline -->
  <text x="42" y="195"
        font-family="'Segoe UI', 'Arial', sans-serif"
        font-size="19" fill="rgba(255,255,255,0.50)">Omnichannel CRM powered by AI</text>

  <!-- Channel badges -->
  <rect x="42"  y="218" width="107" height="28" rx="14" fill="rgba(29,171,217,0.12)" stroke="#1dabd9" stroke-width="1" stroke-opacity="0.5"/>
  <text x="95"  y="237" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="12" font-weight="600" fill="#1dabd9">WhatsApp</text>

  <rect x="157" y="218" width="107" height="28" rx="14" fill="rgba(29,171,217,0.12)" stroke="#1dabd9" stroke-width="1" stroke-opacity="0.5"/>
  <text x="210" y="237" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="12" font-weight="600" fill="#1dabd9">Instagram</text>

  <rect x="272" y="218" width="80"  height="28" rx="14" fill="rgba(29,171,217,0.12)" stroke="#1dabd9" stroke-width="1" stroke-opacity="0.5"/>
  <text x="312" y="237" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="12" font-weight="600" fill="#1dabd9">Email</text>

  <rect x="360" y="218" width="80"  height="28" rx="14" fill="rgba(29,171,217,0.12)" stroke="#1dabd9" stroke-width="1" stroke-opacity="0.5"/>
  <text x="400" y="237" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="12" font-weight="600" fill="#1dabd9">AI Bots</text>

  <!-- Website -->
  <text x="42" y="285"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="13" fill="rgba(255,255,255,0.22)">automarkiq.com</text>

  <!-- ── RIGHT: circuit decorative ring ── -->
  <g opacity="0.45">
    <!-- Outer dashed ring -->
    <circle cx="710" cy="156" r="100" fill="none" stroke="#1dabd9" stroke-width="1.2" stroke-dasharray="9 5"/>
    <!-- Inner dashed ring -->
    <circle cx="710" cy="156" r="62"  fill="none" stroke="#1dabd9" stroke-width="1" stroke-dasharray="5 4"/>
    <!-- Center -->
    <circle cx="710" cy="156" r="13"  fill="#1dabd9" opacity="0.6"/>

    <!-- Cardinal node dots -->
    <circle cx="710" cy="56"  r="6" fill="#1dabd9"/>
    <circle cx="710" cy="256" r="6" fill="#1dabd9"/>
    <circle cx="610" cy="156" r="6" fill="#1dabd9"/>
    <circle cx="810" cy="156" r="4" fill="#1dabd9"/>

    <!-- Diagonal node dots -->
    <circle cx="639" cy="85"  r="4" fill="#1dabd9"/>
    <circle cx="781" cy="227" r="4" fill="#1dabd9"/>
    <circle cx="781" cy="85"  r="4" fill="#1dabd9"/>
    <circle cx="639" cy="227" r="4" fill="#1dabd9"/>

    <!-- Spoke lines -->
    <line x1="710" y1="143" x2="710" y2="69"  stroke="#1dabd9" stroke-width="1.2"/>
    <line x1="710" y1="169" x2="710" y2="243" stroke="#1dabd9" stroke-width="1.2"/>
    <line x1="697" y1="156" x2="623" y2="156" stroke="#1dabd9" stroke-width="1.2"/>
    <line x1="722" y1="156" x2="797" y2="156" stroke="#1dabd9" stroke-width="1.2"/>
  </g>

  <!-- Divider line left/right -->
  <line x1="570" y1="30" x2="570" y2="282" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
</svg>
