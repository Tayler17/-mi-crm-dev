# ══════════════════════════════════════════════════════════════════════════════
# api.automarkiq.com — NestJS API (puerto 4000)
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name api.automarkiq.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.automarkiq.com;

    ssl_certificate     /etc/letsencrypt/live/api.automarkiq.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.automarkiq.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    client_max_body_size 30M;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Todos los requests + archivo separado solo con los 429 bloqueados
    access_log /var/log/nginx/api_access.log combined;
    access_log /var/log/nginx/blocked.log blocked_fmt if=$is_rate_limited;

    # ── SSE / Notificaciones — sin rate limit, conexión persistente ───────────
    location /notifications {
        proxy_pass         http://127.0.0.1:4000/notifications;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_set_header   Connection "";
        proxy_http_version 1.1;
        proxy_read_timeout 3600s;
    }

    # ── Login ─────────────────────────────────────────────────────────────────
    location = /auth/login {
        limit_req zone=rl_login burst=5 nodelay;
        limit_req_status 429;
        limit_req_log_level warn;
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Registro ──────────────────────────────────────────────────────────────
    location = /auth/register {
        limit_req zone=rl_register burst=2 nodelay;
        limit_req_status 429;
        limit_req_log_level warn;
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Reset / forgot-password / verify-email ────────────────────────────────
    location ~ ^/auth/(forgot-password|reset-password|verify-email)$ {
        limit_req zone=rl_reset burst=2 nodelay;
        limit_req_status 429;
        limit_req_log_level warn;
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Webhooks de proveedores confiables — límite alto, no interrumpir ──────
    # Cubre: Stripe, Twilio, Meta/Facebook, Vonage, Telnyx, SMS
    location ~ ^/(billing/webhook|webhooks|connections/(twilio|vonage|telnyx|sms|meta)) {
        limit_req zone=rl_webhooks burst=100 nodelay;
        limit_req_status 429;
        limit_req_log_level warn;
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 30M;
    }

    # ── Webchat público (embebido en sitios de clientes) ──────────────────────
    location ^~ /webchat/ {
        limit_req zone=rl_webchat burst=30 nodelay;
        limit_req_status 429;
        limit_req_log_level warn;
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── API general ───────────────────────────────────────────────────────────
    location / {
        limit_req zone=rl_api burst=40 nodelay;
        limit_req_status 429;
        limit_req_log_level warn;
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 30M;
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# app.automarkiq.com — Next.js Frontend (puerto 3000)
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name app.automarkiq.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.automarkiq.com;

    ssl_certificate     /etc/letsencrypt/live/app.automarkiq.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.automarkiq.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=63072000" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    access_log /var/log/nginx/app_access.log combined;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
