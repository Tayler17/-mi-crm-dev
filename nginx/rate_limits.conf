# AutoMarkIQ — Nginx Rate Limit Zone Definitions
# ══════════════════════════════════════════════════════════════════════════════
# Edita los valores "rate=" aquí para ajustar límites sin tocar los site configs.
# Después de editar: nginx -t && systemctl reload nginx
# Ver requests bloqueados: tail -f /var/log/nginx/blocked.log
# ══════════════════════════════════════════════════════════════════════════════

# ── Auth zones (por IP de cliente) ────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=rl_login:10m    rate=5r/m;
limit_req_zone $binary_remote_addr zone=rl_register:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=rl_reset:10m    rate=3r/m;

# ── General API — 120 req/min por IP (2/seg), soporta bursts normales ─────────
limit_req_zone $binary_remote_addr zone=rl_api:20m      rate=120r/m;

# ── Webhooks de proveedores (Stripe, Twilio, Meta, Vonage) — límite alto ──────
# No limitar demasiado: Stripe/Twilio pueden enviar muchos eventos juntos.
limit_req_zone $binary_remote_addr zone=rl_webhooks:10m rate=300r/m;

# ── Webchat público (embebido en sitios externos) ─────────────────────────────
limit_req_zone $binary_remote_addr zone=rl_webchat:10m  rate=60r/m;

# ── Variable para detectar respuestas 429 (logging condicional) ───────────────
map $status $is_rate_limited {
    429     1;
    default 0;
}

# ── Formato de log para requests bloqueados ───────────────────────────────────
log_format blocked_fmt '$time_iso8601 | BLOCKED-429 | ip=$remote_addr | '
                       '$request_method $host$request_uri | '
                       'ua="$http_user_agent"';
